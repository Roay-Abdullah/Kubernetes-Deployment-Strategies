kind: Deployment
apiVersion: apps/v1
metadata: 
  name: online-shop
  namespace: recreate-ns
  labels:
    app: online-shop 
spec:
  replicas: 4
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: online-shop
  template:
    metadata:
      labels:
        app: online-shop
    spec:
      containers:
      - name: online-shop
        image: amitabhdevops/online-shop
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
